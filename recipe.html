<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipes & Costing — Brain Brew × Heng Heng</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1B4332; --green2: #2D6A4F; --orange: #F97316;
  --bg: #f5f0e8; --card: #ffffff; --border: #e8e2d6;
  --text: #1a2e1a; --muted: #6b7d68;
  --danger: #DC2626; --danger-bg:#FEF2F2;
  --warning:#D97706; --warning-bg:#FFFBEB;
  --success:#16A34A; --success-bg:#F0FDF4;
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
.app { display:flex; height:100vh; }
.sidebar { width:220px; background:var(--green); display:flex; flex-direction:column; flex-shrink:0; padding:0 0 16px; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
.sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:8px; }
.sidebar-logo span { font-family:'Playfair Display',serif; font-size:13px; color:#fff; }
.sidebar-logo-sub { font-size:9px; color:rgba(255,255,255,0.5); margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; padding:0 20px; }
.nav-section { padding:12px 12px 4px; flex:1; overflow-y:auto; }
.nav-label { font-size:9px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; padding:0 8px; margin-bottom:6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:12.5px; color:rgba(255,255,255,0.65); cursor:pointer; transition:all 0.15s; text-decoration:none; margin-bottom:1px; }
.nav-item:hover { background:rgba(255,255,255,0.08); color:#fff; }
.nav-item.active { background:rgba(255,255,255,0.15); color:#fff; font-weight:500; }
.nav-icon { width:16px; text-align:center; font-size:13px; }
.sidebar-footer { padding:12px 20px; border-top:1px solid rgba(255,255,255,0.1); font-size:11px; color:rgba(255,255,255,0.4); }

.topbar { background:var(--bg); padding:18px 24px 0; flex-shrink:0; }
.topbar-top { display:flex; align-items:center; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
.topbar-title { font-family:'Playfair Display',serif; font-size:22px; font-weight:600; color:var(--text); }
.brand-switch { display:flex; gap:4px; background:var(--card); padding:4px; border-radius:10px; border:1px solid var(--border); }
.brand-tab { padding:7px 16px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; color:var(--muted); border:none; background:transparent; transition:all 0.15s; font-family:'DM Sans',sans-serif; }
.brand-tab.active { background:var(--green); color:#fff; }
.topbar-actions { margin-left:auto; display:flex; gap:8px; }
.btn { padding:9px 16px; border-radius:9px; font-size:12.5px; font-weight:500; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost { background:var(--card); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:#faf8f3; border-color:#d5cdbb; }
.btn-primary { background:var(--green); color:#fff; }
.btn-primary:hover { background:var(--green2); }

/* LAYOUT */
.recipe-layout { display:flex; flex:1; overflow:hidden; }
.recipe-list-panel { width:300px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.list-search { padding:14px; border-bottom:1px solid var(--border); }
.search-input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:9px; padding:8px 12px; font-size:12.5px; color:var(--text); font-family:'DM Sans',sans-serif; outline:none; }
.search-input:focus { border-color:var(--green2); }
.recipe-list { flex:1; overflow-y:auto; padding:8px; }
.list-section-title { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; font-weight:700; padding:10px 8px 6px; }
.recipe-list-item { padding:10px 12px; border-radius:10px; cursor:pointer; margin-bottom:2px; transition:background 0.1s; }
.recipe-list-item:hover { background:#faf8f3; }
.recipe-list-item.active { background:var(--green); }
.recipe-list-item.active .rli-name, .recipe-list-item.active .rli-cat { color:#fff; }
.recipe-list-item.active .rli-gp { background:rgba(255,255,255,0.2); color:#fff; }
.rli-name { font-size:13px; font-weight:600; color:var(--text); margin-bottom:3px; }
.rli-meta { display:flex; align-items:center; gap:8px; }
.rli-cat { font-size:10.5px; color:var(--muted); flex:1; }
.rli-gp { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; }
.gp-high { background:var(--success-bg); color:var(--success); }
.gp-mid  { background:var(--warning-bg); color:var(--warning); }
.gp-low  { background:var(--danger-bg); color:var(--danger); }

.detail-panel { flex:1; overflow-y:auto; padding:24px 28px; }
.empty-detail { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); }
.empty-icon { font-size:40px; margin-bottom:12px; opacity:0.4; }

.recipe-hero { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:24px; margin-bottom:16px; }
.recipe-hero-icon { font-size:34px; margin-bottom:8px; }
.recipe-hero-name { font-family:'Playfair Display',serif; font-size:22px; font-weight:600; color:var(--text); margin-bottom:4px; }
.recipe-hero-cat { font-size:12px; color:var(--muted); text-transform:capitalize; margin-bottom:18px; }
.recipe-hero-kpis { display:flex; align-items:center; gap:24px; }
.hero-kpi { flex:1; }
.hero-kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; font-weight:600; }
.hero-kpi-value { font-size:20px; font-weight:700; color:var(--text); }
.hero-kpi-sub { font-size:10.5px; color:var(--muted); margin-top:2px; }
.gp-ring-wrap { flex-shrink:0; }
.gp-ring { position:relative; width:72px; height:72px; }
.gp-ring-svg { transform:rotate(-90deg); }
.gp-ring-track { fill:none; stroke:var(--bg); stroke-width:6; }
.gp-ring-fill { fill:none; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 0.3s; }
.gp-ring-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.gp-ring-pct { font-size:15px; font-weight:700; }
.gp-ring-lbl { font-size:8px; color:var(--muted); text-transform:uppercase; }

.section-card { background:var(--card); border:1px solid var(--border); border-radius:16px; margin-bottom:16px; overflow:hidden; }
.section-card-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.section-card-title { font-size:13px; font-weight:600; color:var(--text); }
.section-card-body { padding:18px; }

.ing-header { display:grid; grid-template-columns:2fr 1.2fr 1fr 1fr 1fr; gap:10px; padding:8px 0; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; font-weight:700; border-bottom:1px solid var(--border); margin-bottom:6px; }
.ing-row { display:grid; grid-template-columns:2fr 1.2fr 1fr 1fr 1fr; gap:10px; padding:10px 0; align-items:center; border-bottom:1px solid var(--bg); }
.ing-row:last-of-type { border-bottom:none; }
.ing-name { font-size:13px; font-weight:500; color:var(--text); }
.ing-sub { font-size:10.5px; color:var(--muted); margin-top:2px; }
.ing-qty-val { font-size:13px; color:var(--text); }
.ing-cost { font-size:13px; color:var(--text); font-weight:500; }

.stock-warn { background:var(--warning-bg); border:1px solid #FDE68A; border-radius:10px; padding:10px 14px; font-size:12px; color:var(--warning); margin-bottom:14px; }

.cost-breakdown { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.cost-item { background:var(--bg); border-radius:12px; padding:14px; }
.cost-item.highlight { background:var(--success-bg); }
.cost-item-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; font-weight:600; }
.cost-item-value { font-size:18px; font-weight:700; color:var(--text); }
.cost-item.highlight .cost-item-value { color:var(--success); }
.cost-item-sub { font-size:10.5px; color:var(--muted); margin-top:3px; }

.empty-state { padding:50px 20px; text-align:center; color:var(--muted); }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(26,46,26,0.4); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal { background:var(--card); border-radius:18px; width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
.modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:600; color:var(--text); }
.modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; line-height:1; }
.modal-body { padding:20px 24px; font-size:13px; color:var(--text); line-height:1.6; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">☕ <span>Brain Brew × Heng Heng</span></div>
    <div class="sidebar-logo-sub">Back Office</div>
    <div class="nav-section">
      <div class="nav-label" style="margin-top:14px">Main</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">▦</span>Dashboard</a>
      <a href="pos.html" class="nav-item"><span class="nav-icon">🛒</span>POS System</a>
      <div class="nav-label" style="margin-top:14px">Operations</div>
      <a href="inventory.html" class="nav-item"><span class="nav-icon">📦</span>Inventory</a>
      <a href="recipe.html" class="nav-item active"><span class="nav-icon">📝</span>Recipes</a>
      <a href="production.html" class="nav-item"><span class="nav-icon">🏭</span>Production</a>
      <div class="nav-label" style="margin-top:14px">Business</div>
      <a href="crm.html" class="nav-item"><span class="nav-icon">👥</span>CRM / Members</a>
      <a href="finance.html" class="nav-item"><span class="nav-icon">💰</span>Finance</a>
      <a href="reports.html" class="nav-item"><span class="nav-icon">📊</span>Reports</a>
      <div class="nav-label" style="margin-top:14px">Settings</div>
      <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>Settings</a>
    </div>
    <div class="sidebar-footer">Owner · All Brands</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-top">
        <div class="topbar-title">Recipes & Costing</div>
        <div class="brand-switch">
          <button class="brand-tab active" onclick="switchBrand('ALL', this)">All</button>
          <button class="brand-tab" onclick="switchBrand('BB', this)">Brain Brew</button>
          <button class="brand-tab" onclick="switchBrand('HH', this)">Heng Heng</button>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" onclick="loadRecipeData()">⟳ Refresh</button>
        </div>
      </div>
    </div>

    <div class="recipe-layout">
      <div class="recipe-list-panel">
        <div class="list-search">
          <input class="search-input" type="text" placeholder="Search recipes…" oninput="filterRecipes(this.value)">
        </div>
        <div class="recipe-list" id="recipe-list">
          <div class="empty-state">⏳ Loading…</div>
        </div>
      </div>

      <div class="detail-panel">
        <div class="empty-detail" id="empty-detail">
          <div class="empty-icon">📝</div>
          <div style="font-size:13px">Select a recipe to view costing details</div>
        </div>
        <div id="recipe-detail" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxw8XBigvESVUCugH7CNUnTWel_s_oMdRrJ4Bbyeb43wF5gwrUaOXrzKIUADUsPR52Pdg/exec';

let RECIPES = [];
let ACTIVE_BRAND = 'ALL';
let activeRecipeId = null;
let scaleMultiplier = 1;

const CAT_LABELS = {
  'CAT-HH-01':'Sandwiches', 'CAT-HH-02':'Salad Box', 'CAT-HH-03':'Noodles', 'CAT-HH-04':'Drinks',
  'CAT-BB-01':'Signature', 'CAT-BB-02':'Classic Iced',
};

function fmt(n) { return '฿' + Number(n||0).toFixed(2); }

function gpClass(gp) {
  if (gp >= 65) return 'gp-high';
  if (gp >= 50) return 'gp-mid';
  return 'gp-low';
}
function gpRingColor(gp) {
  if (gp >= 65) return '#16A34A';
  if (gp >= 50) return '#D97706';
  return '#DC2626';
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadRecipeData() {
  document.getElementById('recipe-list').innerHTML = '<div class="empty-state">⏳ Loading…</div>';
  try {
    const res = await fetch(`${GAS_URL}?action=get_recipes`);
    const json = await res.json();
    if (json.success && json.data) {
      RECIPES = json.data;
    } else {
      RECIPES = [];
    }
  } catch(e) {
    console.error('loadRecipeData error:', e);
    RECIPES = [];
    document.getElementById('recipe-list').innerHTML = `<div class="empty-state">⚠️ Failed to load recipes<br>${e.message}</div>`;
    return;
  }
  renderRecipeList();
}

document.addEventListener('DOMContentLoaded', loadRecipeData);

// ============================================================
// LIST
// ============================================================
function getFilteredRecipes(filter = '') {
  return RECIPES.filter(r => {
    if (ACTIVE_BRAND !== 'ALL' && r.brand !== ACTIVE_BRAND) return false;
    if (filter && !r.name.toLowerCase().includes(filter.toLowerCase()) && !(r.name_th||'').includes(filter)) return false;
    return true;
  });
}

function renderRecipeList(filter = '') {
  const list = document.getElementById('recipe-list');
  const recipes = getFilteredRecipes(filter);

  if (!recipes.length) {
    list.innerHTML = `<div class="empty-state">No recipes found.<br><span style="font-size:11px">Recipes are linked from the recipe_ingredients sheet.</span></div>`;
    return;
  }

  const groups = {};
  recipes.forEach(r => {
    const cat = r.category || 'other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(r);
  });

  list.innerHTML = Object.entries(groups).map(([cat, items]) => `
    <div class="list-section-title">${CAT_LABELS[cat] || cat}</div>
    ${items.map(recipe => `
      <div class="recipe-list-item ${activeRecipeId === recipe.recipe_id ? 'active' : ''}" onclick="selectRecipe('${recipe.recipe_id}')">
        <div class="rli-name">${recipe.icon} ${recipe.name}</div>
        <div class="rli-meta">
          <span class="rli-cat">${recipe.brand} · ${fmt(recipe.cost)}</span>
          <span class="rli-gp ${gpClass(recipe.gp_percent)}">GP ${recipe.gp_percent.toFixed(0)}%</span>
        </div>
      </div>
    `).join('')}
  `).join('');
}

function filterRecipes(val) { renderRecipeList(val); }

function switchBrand(brand, btn) {
  ACTIVE_BRAND = brand;
  document.querySelectorAll('.brand-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeRecipeId = null;
  document.getElementById('empty-detail').style.display = 'flex';
  document.getElementById('recipe-detail').style.display = 'none';
  renderRecipeList();
}

// ============================================================
// DETAIL
// ============================================================
function selectRecipe(id) {
  activeRecipeId = id;
  scaleMultiplier = 1;
  renderRecipeList();
  renderDetail();
}

function setScale(n) {
  scaleMultiplier = n;
  renderDetail();
}

function renderDetail() {
  const recipe = RECIPES.find(r => r.recipe_id === activeRecipeId);
  if (!recipe) return;

  document.getElementById('empty-detail').style.display = 'none';
  document.getElementById('recipe-detail').style.display = 'block';

  const cost = recipe.cost * scaleMultiplier / Math.max(1, scaleMultiplier === 1 ? 1 : 1); // cost per serving stays same; scaled total shown separately
  const costPerServing = recipe.cost;
  const margin = recipe.selling_price - costPerServing;
  const gp = recipe.gp_percent;
  const circumference = 2 * Math.PI * 30;
  const offset = circumference - (Math.max(0,Math.min(100,gp)) / 100) * circumference;
  const ringColor = gpRingColor(gp);

  const totalLineCost = costPerServing * scaleMultiplier;

  document.getElementById('recipe-detail').innerHTML = `
    <div class="recipe-hero">
      <div class="recipe-hero-icon">${recipe.icon}</div>
      <div class="recipe-hero-name">${recipe.name}</div>
      <div class="recipe-hero-cat">${recipe.brand} · ${CAT_LABELS[recipe.category] || recipe.category}${recipe.name_th ? ' · ' + recipe.name_th : ''}</div>
      <div class="recipe-hero-kpis">
        <div class="hero-kpi">
          <div class="hero-kpi-label">Selling Price</div>
          <div class="hero-kpi-value">${fmt(recipe.selling_price)}</div>
          <div class="hero-kpi-sub">Per serving</div>
        </div>
        <div class="hero-kpi">
          <div class="hero-kpi-label">Food Cost</div>
          <div class="hero-kpi-value">${fmt(costPerServing)}</div>
          <div class="hero-kpi-sub">Per serving</div>
        </div>
        <div class="hero-kpi">
          <div class="hero-kpi-label">Gross Profit</div>
          <div class="hero-kpi-value">${fmt(margin)}</div>
          <div class="hero-kpi-sub">Per serving</div>
        </div>
        <div class="gp-ring-wrap">
          <div class="gp-ring">
            <svg class="gp-ring-svg" width="72" height="72" viewBox="0 0 72 72">
              <circle class="gp-ring-track" cx="36" cy="36" r="30"/>
              <circle class="gp-ring-fill" cx="36" cy="36" r="30"
                stroke="${ringColor}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
            </svg>
            <div class="gp-ring-text">
              <div class="gp-ring-pct" style="color:${ringColor}">${gp.toFixed(0)}%</div>
              <div class="gp-ring-lbl">GP</div>
            </div>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px;text-align:center">Gross Margin</div>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-card-header">
        <div class="section-card-title">Batch Scaling</div>
      </div>
      <div class="section-card-body">
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Scale ingredient quantities for batch production:</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <button class="btn ${scaleMultiplier===1?'btn-primary':'btn-ghost'}" style="padding:7px 14px" onclick="setScale(1)">×1</button>
          <button class="btn ${scaleMultiplier===5?'btn-primary':'btn-ghost'}" style="padding:7px 14px" onclick="setScale(5)">×5</button>
          <button class="btn ${scaleMultiplier===10?'btn-primary':'btn-ghost'}" style="padding:7px 14px" onclick="setScale(10)">×10</button>
          <button class="btn ${scaleMultiplier===20?'btn-primary':'btn-ghost'}" style="padding:7px 14px" onclick="setScale(20)">×20</button>
          <span style="margin-left:auto;font-size:13px;color:var(--green2);font-weight:600">
            Total cost: ${fmt(totalLineCost)} for ${scaleMultiplier} serving${scaleMultiplier!==1?'s':''}
          </span>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-card-header">
        <div class="section-card-title">Ingredients · ${recipe.lines.length} items</div>
      </div>
      <div class="section-card-body">
        <div class="ing-header">
          <div>Ingredient</div>
          <div>Qty × ${scaleMultiplier}</div>
          <div>Unit Cost</div>
          <div>Line Cost</div>
          <div>% of Cost</div>
        </div>
        ${recipe.lines.map(line => {
          const lineCost = line.line_cost * scaleMultiplier;
          const pct = costPerServing > 0 ? (line.line_cost / costPerServing) * 100 : 0;
          return `
            <div class="ing-row">
              <div>
                <div class="ing-name">${line.name}</div>
                <div class="ing-sub">${line.unit}</div>
              </div>
              <div class="ing-qty-val">${(line.qty*scaleMultiplier).toLocaleString()} ${line.unit}</div>
              <div class="ing-cost">${fmt(line.unit_cost)}/${line.unit}</div>
              <div class="ing-cost">${fmt(lineCost)}</div>
              <div style="display:flex;align-items:center;gap:6px">
                <div style="flex:1;height:3px;background:var(--bg);border-radius:2px">
                  <div style="width:${Math.min(100,pct)}%;height:100%;border-radius:2px;background:var(--green2)"></div>
                </div>
                <span style="font-size:10.5px;color:var(--muted);min-width:32px;text-align:right">${pct.toFixed(0)}%</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="section-card">
      <div class="section-card-header">
        <div class="section-card-title">Cost Breakdown</div>
      </div>
      <div class="section-card-body">
        <div class="cost-breakdown">
          <div class="cost-item">
            <div class="cost-item-label">Food Cost</div>
            <div class="cost-item-value">${fmt(costPerServing)}</div>
            <div class="cost-item-sub">${recipe.selling_price > 0 ? ((costPerServing/recipe.selling_price)*100).toFixed(1) : 0}% of selling price</div>
          </div>
          <div class="cost-item highlight">
            <div class="cost-item-label">Gross Profit</div>
            <div class="cost-item-value">${fmt(margin)}</div>
            <div class="cost-item-sub">GP Margin: ${gp.toFixed(1)}%</div>
          </div>
        </div>
      </div>
    </div>
  `;
}
