<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heng Heng Phanit — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#143D2B; --green2:#1E5A3F;
  --orange:#F26C21;
  --bg:#F7E9D6; --card:#fffdf9; --border:#e8e2d6;
  --text:#1a2e1a; --muted:#6b7d68;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'Anuphan','Poppins',sans-serif; background:#ECE3D2; color:var(--text); }
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }

.frame {
  display:flex; width:100%; max-width:1280px; height:min(760px, calc(100vh - 48px));
  background:var(--bg); border-radius:28px; overflow:hidden;
  box-shadow:0 30px 80px rgba(20,61,43,0.18);
}

/* ===== LEFT — PHOTO BACKGROUND ===== */
.left {
  flex:1.05; position:relative; overflow:hidden;
  background-image:url('hh-login-bg.jpg');
  background-size:cover;
  background-position:center 30%;
  background-color:#ECE3D2; /* fallback ถ้ารูปโหลดไม่ขึ้น */
}
.left::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(20,40,25,0.04) 0%, rgba(20,40,25,0.02) 50%, rgba(20,30,20,0.18) 100%);
}

/* ===== RIGHT — LOGIN FORM ===== */
.right {
  width:460px; flex-shrink:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  padding:44px 48px; position:relative; overflow:hidden;
}
.leaf-deco-corner {
  position:absolute; top:0; right:0; width:240px; height:160px;
  opacity:0.35; pointer-events:none;
}

.form-wrap { width:100%; max-width:360px; position:relative; z-index:2; }

.welcome-title { font-family:'Poppins',sans-serif; font-size:27px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:10px; }
.welcome-sub { font-size:13px; color:var(--muted); margin-bottom:26px; margin-top:4px; }

.role-select { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:24px; }
.role-btn { background:var(--card); border:1.5px solid var(--border); border-radius:13px; padding:13px 6px; cursor:pointer; text-align:center; transition:all 0.15s; font-family:'Anuphan',sans-serif; }
.role-btn:hover { border-color:#d5cdbb; }
.role-btn.active { border-color:#C9A876; background:#F3E8D4; box-shadow:0 2px 8px rgba(180,140,70,0.12); }
.role-icon { font-size:18px; display:block; margin-bottom:5px; }
.role-label { font-size:11.5px; font-weight:600; color:var(--text); }

.form-group { margin-bottom:18px; }
.form-label { font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; font-weight:700; margin-bottom:7px; display:block; }
.input-wrap { position:relative; display:flex; align-items:center; }
.input-icon { position:absolute; left:14px; opacity:0.45; font-size:14px; pointer-events:none; }
.form-input { width:100%; background:var(--card); border:1.5px solid var(--border); border-radius:12px; padding:12px 16px 12px 40px; font-size:13.5px; color:var(--text); font-family:'Anuphan',sans-serif; outline:none; transition:border 0.15s; }
.form-input:focus { border-color:var(--green); }
.toggle-pw { position:absolute; right:14px; cursor:pointer; opacity:0.5; background:none; border:none; font-size:14px; padding:4px; }
.toggle-pw:hover { opacity:0.8; }

.row-between { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; font-size:12px; }
.remember { display:flex; align-items:center; gap:7px; color:var(--text); cursor:pointer; user-select:none; }
.remember input { width:15px; height:15px; accent-color:var(--green); cursor:pointer; }
.forgot-link { color:var(--orange); font-weight:500; text-decoration:none; }
.forgot-link:hover { text-decoration:underline; }

.btn-signin { width:100%; background:#5C7A4A; color:#fff; border:none; border-radius:12px; padding:14px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Anuphan',sans-serif; transition:background 0.15s; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-signin:hover { background:#4d6a3d; }
.btn-signin:disabled { opacity:0.6; cursor:not-allowed; }

.divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
.divider-line { flex:1; height:1px; background:var(--border); }
.divider-text { font-size:10.5px; color:var(--muted); font-weight:600; }

.btn-google { width:100%; background:var(--card); border:1.5px solid var(--border); border-radius:12px; padding:12px; font-size:13.5px; font-weight:500; cursor:pointer; font-family:'Anuphan',sans-serif; color:var(--text); display:flex; align-items:center; justify-content:center; gap:10px; transition:background 0.15s; }
.btn-google:hover { background:#faf6ed; }

.footer-text { text-align:center; margin-top:24px; }
.footer-brand { font-size:12px; color:var(--orange); font-weight:600; }
.footer-copyright { font-size:10.5px; color:var(--muted); margin-top:4px; }

.error-msg { background:#FEF2F2; border:1px solid #FECACA; color:#DC2626; border-radius:10px; padding:10px 14px; font-size:12px; margin-bottom:16px; display:none; }
.error-msg.show { display:block; }

@media (max-width: 900px) {
  .frame { flex-direction:column; height:auto; max-width:460px; }
  .left { display:none; }
  .right { width:100%; padding:36px 28px; }
}
</style>
</head>
<body>

<div class="frame">
  <!-- ===== LEFT: PHOTO ===== -->
  <div class="left"></div>

  <!-- ===== RIGHT: LOGIN FORM ===== -->
  <div class="right">
    <svg class="leaf-deco-corner" viewBox="0 0 240 160" fill="none">
      <path d="M40 20 Q90 10 130 35 Q170 60 210 30" stroke="#A7C48D" stroke-width="1.5" opacity="0.6"/>
      <ellipse cx="70" cy="25" rx="10" ry="5" fill="#A7C48D" opacity="0.5" transform="rotate(-30 70 25)"/>
      <ellipse cx="105" cy="32" rx="10" ry="5" fill="#A7C48D" opacity="0.5" transform="rotate(10 105 32)"/>
      <ellipse cx="145" cy="42" rx="10" ry="5" fill="#A7C48D" opacity="0.5" transform="rotate(-15 145 42)"/>
      <ellipse cx="185" cy="35" rx="10" ry="5" fill="#A7C48D" opacity="0.5" transform="rotate(25 185 35)"/>
    </svg>

    <div class="form-wrap">
      <div class="welcome-title">Welcome back! 🌿</div>
      <div class="welcome-sub">Sign in to access your BrewOS workspace</div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="role-select">
        <button class="role-btn active" id="roleOwner" onclick="selectRole('owner', this)">
          <span class="role-icon">👑</span>
          <span class="role-label">Owner</span>
        </button>
        <button class="role-btn" id="roleManager" onclick="selectRole('manager', this)">
          <span class="role-icon">🧑‍💼</span>
          <span class="role-label">Manager</span>
        </button>
        <button class="role-btn" id="roleCashier" onclick="selectRole('staff', this)">
          <span class="role-icon">🛍</span>
          <span class="role-label">Cashier</span>
        </button>
      </div>

      <div class="form-group">
        <label class="form-label">Email / Username</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="text" class="form-input" id="username" placeholder="owner@brewos.app" value="owner@brewos.app">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-input" id="password" placeholder="••••••••" value="admin123">
          <button class="toggle-pw" type="button" onclick="togglePassword()" id="togglePwBtn">👁</button>
        </div>
      </div>

      <div class="row-between">
        <label class="remember">
          <input type="checkbox" id="rememberMe">
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button class="btn-signin" id="signInBtn" onclick="doLogin()">
        Sign In to Dashboard →
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">OR</div>
        <div class="divider-line"></div>
      </div>

      <button class="btn-google" onclick="alert('Google Sign-In ยังไม่ได้เชื่อมต่อ — ใช้ email/password ด้านบนก่อนได้ครับ')">
        <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Sign in with Google
      </button>

      <div class="footer-text">
        <div class="footer-brand">🌿 Heng Heng Phanit Cafe</div>
        <div class="footer-copyright">© 2026 All rights reserved.</div>
      </div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxw8XBigvESVUCugH7CNUnTWel_s_oMdRrJ4Bbyeb43wF5gwrUaOXrzKIUADUsPR52Pdg/exec';
let currentRole = 'owner';

function selectRole(role, el) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function togglePassword() {
  const pw = document.getElementById('password');
  const btn = document.getElementById('togglePwBtn');
  if (pw.type === 'password') {
    pw.type = 'text';
    btn.textContent = '🙈';
  } else {
    pw.type = 'password';
    btn.textContent = '👁';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

async function doLogin() {
  hideError();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('signInBtn');

  if (!username || !password) {
    showError('กรุณากรอกอีเมล/ชื่อผู้ใช้และรหัสผ่าน');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'กำลังเข้าสู่ระบบ...';

  try {
    // Demo/offline fallback — เข้าได้ด้วย demo credential เสมอแม้ backend ไม่พร้อม
    if (username === 'owner@brewos.app' && password === 'admin123') {
      localStorage.setItem('brewos_role', currentRole);
      localStorage.setItem('brewos_user', username);
      const redirectMap = { owner: 'dashboard.html', manager: 'dashboard.html', staff: 'pos.html' };
      window.location.href = redirectMap[currentRole] || 'dashboard.html';
      return;
    }

    const res = await fetch(`${GAS_URL}?action=login&email=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&brand=HH`);
    const json = await res.json();

    if (json.success && json.data && json.data.user) {
      localStorage.setItem('brewos_role', json.data.user.role || currentRole);
      localStorage.setItem('brewos_user', username);
      const redirectMap = { owner: 'dashboard.html', manager: 'dashboard.html', staff: 'pos.html', cashier: 'pos.html' };
      window.location.href = redirectMap[json.data.user.role] || 'dashboard.html';
    } else {
      showError(json.error || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
      btn.disabled = false;
      btn.textContent = 'Sign In to Dashboard →';
    }
  } catch (e) {
    showError('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ — ลองใช้ demo login ด้านบน');
    btn.disabled = false;
    btn.textContent = 'Sign In to Dashboard →';
  }
}

document.getElementById('password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
