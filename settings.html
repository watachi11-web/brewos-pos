<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — BrewOS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#143D2B; --green2:#1E5A3F;
  --bg:#F7E9D6; --card:#ffffff; --border:#e8e2d6;
  --text:#1a2e1a; --muted:#6b7d68;
  --success:#16A34A; --success-bg:#F0FDF4;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'Anuphan','Poppins',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
.app { display:flex; height:100vh; }
.sidebar { width:220px; background:var(--green); display:flex; flex-direction:column; flex-shrink:0; padding:0 0 16px; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:8px; }
.sidebar-logo span { font-family:'Poppins',sans-serif; font-size:13px; color:#fff; }
.sidebar-logo-sub { font-size:9px; color:rgba(255,255,255,0.5); margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; padding:0 20px; }
.nav-section { padding:12px 12px 4px; flex:1; overflow-y:auto; }
.nav-label { font-size:9px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; padding:0 8px; margin-bottom:6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:12.5px; color:rgba(255,255,255,0.65); cursor:pointer; transition:all 0.15s; text-decoration:none; margin-bottom:1px; }
.nav-item:hover { background:rgba(255,255,255,0.08); color:#fff; }
.nav-item.active { background:rgba(255,255,255,0.15); color:#fff; font-weight:500; }
.nav-icon { width:16px; text-align:center; font-size:13px; }
.sidebar-footer { padding:12px 20px; border-top:1px solid rgba(255,255,255,0.1); font-size:11px; color:rgba(255,255,255,0.4); }

.topbar { background:var(--bg); padding:20px 28px 0; flex-shrink:0; }
.topbar-top { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.topbar-title { font-family:'Poppins',sans-serif; font-size:24px; font-weight:600; }
.topbar-actions { margin-left:auto; display:flex; gap:8px; }
.btn { padding:9px 16px; border-radius:9px; font-size:12.5px; font-weight:500; cursor:pointer; border:none; font-family:'Anuphan','Poppins',sans-serif; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost { background:var(--card); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:#faf8f3; }
.btn-primary { background:var(--green); color:#fff; }
.btn-primary:hover { background:var(--green2); }

.content { flex:1; overflow-y:auto; padding:20px 28px 28px; max-width:760px; }
.content::-webkit-scrollbar { width:6px; }
.content::-webkit-scrollbar-thumb { background:#d5cdbb; border-radius:3px; }

.section-card { background:var(--card); border:1px solid var(--border); border-radius:16px; margin-bottom:18px; overflow:hidden; }
.section-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.section-title { font-size:14px; font-weight:600; color:var(--text); }
.section-body { padding:4px 0; }

.setting-row { display:flex; align-items:center; gap:16px; padding:14px 20px; border-bottom:1px solid var(--bg); }
.setting-row:last-child { border-bottom:none; }
.setting-label { flex:1; }
.setting-name { font-size:13px; font-weight:500; color:var(--text); }
.setting-desc { font-size:11px; color:var(--muted); margin-top:2px; }
.setting-input { background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:8px 12px; font-size:13px; color:var(--text); font-family:'Anuphan','Poppins',sans-serif; outline:none; width:260px; transition:border 0.15s; }
.setting-input:focus { border-color:var(--green2); }
.setting-toggle { position:relative; width:42px; height:24px; flex-shrink:0; }
.setting-toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; cursor:pointer; inset:0; background:#d5cdbb; border-radius:12px; transition:0.2s; }
.toggle-slider:before { content:""; position:absolute; width:18px; height:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.2s; }
input:checked + .toggle-slider { background:var(--green); }
input:checked + .toggle-slider:before { transform:translateX(18px); }

.save-toast { position:fixed; bottom:24px; right:24px; background:var(--green); color:#fff; padding:10px 18px; border-radius:12px; font-size:13px; font-weight:500; transform:translateY(60px); opacity:0; transition:all 0.3s; z-index:100; }
.save-toast.show { transform:translateY(0); opacity:1; }

.version-tag { background:rgba(22,163,74,0.1); color:var(--success); border-radius:6px; padding:2px 8px; font-size:11px; font-weight:600; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo"><img src="logo-hh-icon.png" style="width:32px;height:32px;object-fit:contain;flex-shrink:0"> <span>Brain Brew × Heng Heng</span></div>
    <div class="sidebar-logo-sub">Back Office</div>
    <div class="nav-section">
      <div class="nav-label" style="margin-top:14px">Main</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">▦</span>Dashboard</a>
      <a href="pos.html" class="nav-item"><span class="nav-icon">🛒</span>POS System</a>
      <div class="nav-label" style="margin-top:14px">Operations</div>
      <a href="kitchen.html" class="nav-item"><span class="nav-icon">👨‍🍳</span>Kitchen</a>
      <a href="orders.html" class="nav-item"><span class="nav-icon">📋</span>Orders</a>
      <a href="inventory.html" class="nav-item"><span class="nav-icon">📦</span>Inventory</a>
      <a href="recipe.html" class="nav-item"><span class="nav-icon">📝</span>Recipes</a>
      <div class="nav-label" style="margin-top:14px">Business</div>
      <a href="crm.html" class="nav-item"><span class="nav-icon">👥</span>CRM / Members</a>
      <a href="finance.html" class="nav-item"><span class="nav-icon">💰</span>Finance</a>
      <a href="reports.html" class="nav-item"><span class="nav-icon">📊</span>Reports</a>
      <div class="nav-label" style="margin-top:14px">Settings</div>
      <a href="settings.html" class="nav-item active"><span class="nav-icon">⚙️</span>Settings</a>
    </div>
    <div class="sidebar-footer">Owner · All Brands</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-top">
        <div class="topbar-title">Settings</div>
        <span class="version-tag">BrewOS v2.4</span>
        <div class="topbar-actions">
          <button class="btn btn-ghost" onclick="loadSettings()">⟳ Refresh</button>
        </div>
      </div>
    </div>

    <div class="content" id="settings-content">
      <div style="text-align:center;padding:60px;color:var(--muted)">⏳ Loading settings…</div>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast">✅ Setting saved</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxw8XBigvESVUCugH7CNUnTWel_s_oMdRrJ4Bbyeb43wF5gwrUaOXrzKIUADUsPR52Pdg/exec';
let SETTINGS = {};

async function loadSettings() {
  try {
    const res = await fetch(`${GAS_URL}?action=get_settings`);
    const json = await res.json();
    SETTINGS = (json.success && json.data) ? json.data : {};
  } catch(e) {
    console.error('loadSettings:', e);
    SETTINGS = {};
  }
  renderSettings();
}

document.addEventListener('DOMContentLoaded', loadSettings);

function renderSettings() {
  // กลุ่ม settings ตาม group
  const groups = {};
  Object.entries(SETTINGS).forEach(([key, s]) => {
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push({ key, ...s });
  });

  const groupIcons = {
    Brand: '🏪', Receipt: '🧾', Hours: '🕐', General: '⚙️', Notifications: '🔔'
  };

  const content = document.getElementById('settings-content');
  content.innerHTML = Object.entries(groups).map(([group, items]) => `
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">${groupIcons[group]||'⚙️'} ${group}</div>
      </div>
      <div class="section-body">
        ${items.map(s => renderSettingRow(s)).join('')}
      </div>
    </div>
  `).join('') + `
    <div class="section-card">
      <div class="section-header"><div class="section-title">ℹ️ System Info</div></div>
      <div class="section-body">
        <div class="setting-row">
          <div class="setting-label"><div class="setting-name">Version</div><div class="setting-desc">BrewOS backend version</div></div>
          <div style="font-size:13px;color:var(--muted);font-weight:500">v2.4.0</div>
        </div>
        <div class="setting-row">
          <div class="setting-label"><div class="setting-name">Google Sheet</div><div class="setting-desc">Primary data source</div></div>
          <a href="https://docs.google.com/spreadsheets/d/1QX_Qs9vuv0mNvvPjSaJoY0utZibFy7-iulARDto73CU/edit" target="_blank" class="btn btn-ghost" style="padding:6px 12px;font-size:11.5px">Open Sheet ↗</a>
        </div>
        <div class="setting-row">
          <div class="setting-label"><div class="setting-name">Apps Script</div><div class="setting-desc">Backend API endpoint</div></div>
          <a href="https://script.google.com/home" target="_blank" class="btn btn-ghost" style="padding:6px 12px;font-size:11.5px">Open Scripts ↗</a>
        </div>
      </div>
    </div>
  `;
}

function renderSettingRow(s) {
  if (s.type === 'boolean') {
    const checked = s.value === 'true' ? 'checked' : '';
    return `
      <div class="setting-row">
        <div class="setting-label">
          <div class="setting-name">${s.label}</div>
        </div>
        <label class="setting-toggle">
          <input type="checkbox" ${checked} onchange="saveSetting('${s.key}', this.checked.toString())">
          <span class="toggle-slider"></span>
        </label>
      </div>`;
  }
  return `
    <div class="setting-row">
      <div class="setting-label">
        <div class="setting-name">${s.label}</div>
      </div>
      <input class="setting-input" type="${s.type === 'time' ? 'time' : 'text'}"
        value="${s.value}" 
        onchange="saveSetting('${s.key}', this.value)"
        placeholder="—">
    </div>`;
}

async function saveSetting(key, value) {
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'update_setting', key, value })
    });
    const json = await res.json();
    if (json.success) {
      SETTINGS[key].value = value;
      showToast();
    }
  } catch(e) {
    alert('Failed to save: ' + e.message);
  }
}

function showToast() {
  const t = document.getElementById('save-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
