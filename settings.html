<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Brain Brew × Heng Heng</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#143D2B; --green2:#1E5A3F; --orange:#F26C21;
  --bg:#F7E9D6; --card:#ffffff; --border:#e8e2d6;
  --text:#1a2e1a; --muted:#6b7d68;
  --success:#16A34A; --success-bg:#F0FDF4;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'Anuphan','Poppins',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
.app { display:flex; height:100vh; }
.sidebar { width:220px; background:var(--green); display:flex; flex-direction:column; flex-shrink:0; padding:0 0 16px; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:8px; }
.sidebar-logo span { font-family:'Poppins',sans-serif; font-size:13px; color:#fff; }
.sidebar-logo-sub { font-size:9px; color:rgba(255,255,255,0.5); margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; padding:0 20px; }
.nav-section { padding:12px 12px 4px; flex:1; overflow-y:auto; }
.nav-label { font-size:9px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; padding:0 8px; margin-bottom:6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:12.5px; color:rgba(255,255,255,0.65); cursor:pointer; transition:all 0.15s; text-decoration:none; margin-bottom:1px; }
.nav-item:hover { background:rgba(255,255,255,0.08); color:#fff; }
.nav-item.active { background:rgba(255,255,255,0.15); color:#fff; font-weight:500; }
.nav-icon { width:16px; text-align:center; font-size:13px; }
.sidebar-footer { padding:12px 20px; border-top:1px solid rgba(255,255,255,0.1); font-size:11px; color:rgba(255,255,255,0.4); }

.topbar { background:var(--bg); padding:20px 28px 0; flex-shrink:0; }
.topbar-top { display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
.topbar-title { font-family:'Poppins',sans-serif; font-size:24px; font-weight:600; }
.topbar-actions { margin-left:auto; display:flex; gap:8px; }
.btn { padding:9px 16px; border-radius:9px; font-size:12.5px; font-weight:500; cursor:pointer; border:none; font-family:'Anuphan','Poppins',sans-serif; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost { background:var(--card); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:#faf8f3; border-color:#d5cdbb; }
.btn-primary { background:var(--green); color:#fff; }
.btn-primary:hover { background:var(--green2); }
.btn:disabled { opacity:.5; pointer-events:none; }

.content { flex:1; overflow-y:auto; padding:20px 28px 28px; max-width:760px; }

.settings-group { background:var(--card); border:1px solid var(--border); border-radius:16px; margin-bottom:16px; overflow:hidden; }
.settings-group-header { padding:14px 20px; border-bottom:1px solid var(--border); font-size:13px; font-weight:700; color:var(--text); }
.setting-row { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); gap:16px; }
.setting-row:last-child { border-bottom:none; }
.setting-label { font-size:13px; font-weight:500; color:var(--text); }
.setting-desc { font-size:11px; color:var(--muted); margin-top:2px; }
.setting-input { width:180px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:13px; font-family:'Anuphan','Poppins',sans-serif; outline:none; color:var(--text); text-align:right; }
.setting-input:focus { border-color:var(--green2); }
.save-row-btn { padding:6px 12px; font-size:11px; border-radius:7px; border:none; background:var(--green); color:#fff; cursor:pointer; font-family:'Anuphan','Poppins',sans-serif; flex-shrink:0; }
.save-row-btn:disabled { opacity:.4; pointer-events:none; }

.empty-state { padding:40px 24px; text-align:center; color:var(--muted); }
.loading-text { padding:30px; text-align:center; color:var(--muted); font-size:13px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo"><img src="logo-hh-icon.png" style="width:32px;height:32px;object-fit:contain;flex-shrink:0" onerror="this.style.display='none'"> <span>Brain Brew × Heng Heng</span></div>
    <div class="sidebar-logo-sub">Back Office</div>
    <div class="nav-section">
      <div class="nav-label" style="margin-top:14px">Main</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">▦</span>Dashboard</a>
      <a href="pos.html" class="nav-item"><span class="nav-icon">🛒</span>POS System</a>
      <div class="nav-label" style="margin-top:14px">Operations</div>
      <a href="kitchen.html" class="nav-item"><span class="nav-icon">👨‍🍳</span>Kitchen</a>
      <a href="orders.html" class="nav-item"><span class="nav-icon">📋</span>Orders</a>
      <a href="inventory.html" class="nav-item"><span class="nav-icon">📦</span>Inventory</a>
      <a href="recipe.html" class="nav-item"><span class="nav-icon">📝</span>Recipes</a>
      <div class="nav-label" style="margin-top:14px">Business</div>
      <a href="crm.html" class="nav-item"><span class="nav-icon">👥</span>CRM / Members</a>
      <a href="finance.html" class="nav-item"><span class="nav-icon">💰</span>Finance</a>
      <a href="reports.html" class="nav-item"><span class="nav-icon">📊</span>Reports</a>
      <div class="nav-label" style="margin-top:14px">Settings</div>
      <a href="staff.html" class="nav-item"><span class="nav-icon">🧑‍💼</span>Staff</a>
      <a href="settings.html" class="nav-item active"><span class="nav-icon">⚙️</span>Settings</a>
    </div>
    <div class="sidebar-footer" id="staff-footer">Owner · All Brands</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-top">
        <div class="topbar-title">Settings</div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" onclick="loadSettings()">⟳ Refresh</button>
        </div>
      </div>
    </div>

    <div class="content" id="settings-content">
      <div class="loading-text">⏳ Loading…</div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// settings.html — ผูกกับ get_settings()/update_setting() ใน รหัส.gs ที่มีอยู่แล้ว
// getSettings() คืนค่าเป็น object { key: {value, label, type, group} } — จัดกลุ่มตาม
// field 'group' แล้ว render เป็น form ให้แก้ทีละค่า บันทึกทันทีทีละ setting (ไม่มี
// batch save เพราะ backend เขียนทีละ key อยู่แล้ว)
// ═══════════════════════════════════════════════════════════
let SETTINGS = {};

document.getElementById('staff-footer').textContent = Identity.getName() + ' · All Brands';

async function loadSettings() {
  document.getElementById('settings-content').innerHTML = '<div class="loading-text">⏳ Loading…</div>';
  try {
    SETTINGS = await API.settings();
  } catch(e) {
    console.error('loadSettings failed:', e);
    document.getElementById('settings-content').innerHTML = `<div class="empty-state">โหลดไม่สำเร็จ: ${e.message}</div>`;
    return;
  }
  renderSettings();
}
document.addEventListener('DOMContentLoaded', loadSettings);

function renderSettings() {
  const keys = Object.keys(SETTINGS);
  const content = document.getElementById('settings-content');

  if (!keys.length) {
    content.innerHTML = `<div class="empty-state">ยังไม่มีการตั้งค่าใน settings sheet<br><span style="font-size:11px">เพิ่มแถวใน sheet 'settings' พร้อม key/value/label/type/group เพื่อให้แสดงที่นี่</span></div>`;
    return;
  }

  const groups = {};
  keys.forEach(k => {
    const s = SETTINGS[k];
    const g = s.group || 'General';
    if (!groups[g]) groups[g] = [];
    groups[g].push({ key: k, ...s });
  });

  content.innerHTML = Object.entries(groups).map(([groupName, items]) => `
    <div class="settings-group">
      <div class="settings-group-header">${groupName}</div>
      ${items.map(item => `
        <div class="setting-row">
          <div>
            <div class="setting-label">${item.label || item.key}</div>
            <div class="setting-desc">${item.key}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <input class="setting-input" type="${item.type === 'number' ? 'number' : 'text'}"
              id="set-${item.key}" value="${item.value}"
              onkeydown="if(event.key==='Enter') saveSetting('${item.key}')">
            <button class="save-row-btn" id="save-btn-${item.key}" onclick="saveSetting('${item.key}')">Save</button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

async function saveSetting(key) {
  const input = document.getElementById(`set-${key}`);
  const btn = document.getElementById(`save-btn-${key}`);
  const value = input.value;

  UI.loading(btn, true);
  try {
    const result = await API.updateSetting({ key, value });
    if (!result || !result.success) throw new Error((result && result.error) || 'บันทึกไม่สำเร็จ');
    UI.toast(`บันทึก "${key}" แล้ว`);
    SETTINGS[key].value = value;
  } catch(e) {
    console.error('saveSetting failed:', e);
    UI.toast('บันทึกไม่สำเร็จ: ' + e.message, 'error');
  } finally {
    UI.loading(btn, false);
    btn.textContent = 'Save';
  }
}
</script>
</body>
</html>
