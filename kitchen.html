<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Display — BrewOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1B4332; --green2:#2D6A4F;
  --bg:#f5f0e8; --card:#ffffff; --border:#e8e2d6;
  --text:#1a2e1a; --muted:#6b7d68;
  --pending:#F97316; --pending-bg:#FFF7ED;
  --making:#3B82F6; --making-bg:#EFF6FF;
  --done:#16A34A; --done-bg:#F0FDF4;
  --hh:#FB923C; --bb:#52B788;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'DM Sans',sans-serif; background:#1a2e1a; color:#fff; overflow:hidden; }

.kds-header { background:#111; padding:12px 20px; display:flex; align-items:center; gap:16px; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; }
.kds-logo { font-family:'Playfair Display',serif; font-size:15px; color:#fff; }
.kds-brand-tabs { display:flex; gap:4px; }
.kds-tab { padding:5px 16px; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; background:rgba(255,255,255,0.08); border:none; color:rgba(255,255,255,0.5); font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.kds-tab.active { background:var(--green2); color:#fff; }
.kds-stats { margin-left:auto; display:flex; gap:20px; }
.kds-stat { text-align:center; }
.kds-stat-val { font-size:18px; font-weight:700; line-height:1; }
.kds-stat-lbl { font-size:9px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; }
.kds-time { font-size:13px; color:rgba(255,255,255,0.5); }
.kds-refresh { padding:6px 14px; border-radius:8px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.kds-refresh:hover { background:rgba(255,255,255,0.15); color:#fff; }

.kds-body { flex:1; display:flex; overflow:hidden; height:calc(100vh - 57px); }

.kds-col { flex:1; display:flex; flex-direction:column; overflow:hidden; border-right:1px solid rgba(255,255,255,0.06); }
.kds-col:last-child { border-right:none; }
.kds-col-header { padding:10px 14px; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.kds-col-dot { width:8px; height:8px; border-radius:50%; }
.kds-col-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
.kds-col-count { font-size:10px; color:rgba(255,255,255,0.4); margin-left:auto; }
.kds-col-body { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:8px; }
.kds-col-body::-webkit-scrollbar { width:4px; }
.kds-col-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

.order-card { background:rgba(255,255,255,0.06); border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,0.08); transition:all 0.2s; }
.order-card:hover { background:rgba(255,255,255,0.09); }
.order-card-header { padding:10px 14px; display:flex; align-items:center; gap:8px; border-bottom:1px solid rgba(255,255,255,0.06); }
.order-id { font-size:12px; font-weight:700; color:#fff; flex:1; }
.order-time { font-size:10px; color:rgba(255,255,255,0.4); }
.order-table { font-size:10px; color:rgba(255,255,255,0.5); }
.brand-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.order-items { padding:10px 14px; display:flex; flex-direction:column; gap:6px; }
.order-item { display:flex; align-items:flex-start; gap:8px; }
.item-qty { font-size:14px; font-weight:700; color:#fff; min-width:20px; line-height:1.2; }
.item-name { font-size:12px; font-weight:500; color:rgba(255,255,255,0.85); line-height:1.3; flex:1; }
.order-card-footer { padding:8px 14px; display:flex; gap:6px; border-top:1px solid rgba(255,255,255,0.06); }
.action-btn { flex:1; padding:7px; border-radius:7px; font-size:11px; font-weight:600; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.btn-start  { background:rgba(59,130,246,0.2); color:#93C5FD; border:1px solid rgba(59,130,246,0.3); }
.btn-start:hover  { background:rgba(59,130,246,0.35); }
.btn-done   { background:rgba(22,163,74,0.2); color:#86EFAC; border:1px solid rgba(22,163,74,0.3); }
.btn-done:hover   { background:rgba(22,163,74,0.35); }
.btn-recall { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.1); }
.btn-recall:hover { background:rgba(255,255,255,0.12); }

.timer { font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; }
.timer-ok     { background:rgba(22,163,74,0.2); color:#86EFAC; }
.timer-warn   { background:rgba(249,115,22,0.2); color:#FDB98B; }
.timer-urgent { background:rgba(220,38,38,0.25); color:#FCA5A5; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

.empty-col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; opacity:0.25; font-size:13px; }
.loading-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:100; font-size:15px; }
</style>
</head>
<body>

<div class="kds-header">
  <div class="kds-logo">☕ Kitchen Display</div>
  <div class="kds-brand-tabs">
    <button class="kds-tab active" onclick="switchBrand('ALL',this)">All</button>
    <button class="kds-tab" onclick="switchBrand('BB',this)">Brain Brew</button>
    <button class="kds-tab" onclick="switchBrand('HH',this)">Heng Heng</button>
  </div>
  <div class="kds-stats">
    <div class="kds-stat"><div class="kds-stat-val" id="stat-pending">0</div><div class="kds-stat-lbl">Pending</div></div>
    <div class="kds-stat"><div class="kds-stat-val" id="stat-making">0</div><div class="kds-stat-lbl">Making</div></div>
    <div class="kds-stat"><div class="kds-stat-val" id="stat-done-today">0</div><div class="kds-stat-lbl">Done Today</div></div>
  </div>
  <div class="kds-time" id="kds-clock">--:--</div>
  <button class="kds-refresh" onclick="loadOrders()">⟳ Refresh</button>
  <a href="dashboard.html" style="margin-left:8px"><button class="kds-refresh">← Back</button></a>
</div>

<div class="kds-body">
  <div class="kds-col">
    <div class="kds-col-header">
      <div class="kds-col-dot" style="background:var(--pending)"></div>
      <div class="kds-col-title" style="color:var(--pending)">New Orders</div>
      <div class="kds-col-count" id="count-pending">0</div>
    </div>
    <div class="kds-col-body" id="col-pending"></div>
  </div>
  <div class="kds-col">
    <div class="kds-col-header">
      <div class="kds-col-dot" style="background:var(--making)"></div>
      <div class="kds-col-title" style="color:var(--making)">In Progress</div>
      <div class="kds-col-count" id="count-making">0</div>
    </div>
    <div class="kds-col-body" id="col-making"></div>
  </div>
  <div class="kds-col">
    <div class="kds-col-header">
      <div class="kds-col-dot" style="background:var(--done)"></div>
      <div class="kds-col-title" style="color:var(--done)">Ready</div>
      <div class="kds-col-count" id="count-done">0</div>
    </div>
    <div class="kds-col-body" id="col-done"></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxw8XBigvESVUCugH7CNUnTWel_s_oMdRrJ4Bbyeb43wF5gwrUaOXrzKIUADUsPR52Pdg/exec';

// Kitchen state: stored in memory (not persisted — refreshing resets to "pending")
// In-progress / ready orders are tracked locally per session
const kitchenState = {}; // orderId → 'pending' | 'making' | 'done'
let ACTIVE_BRAND = 'ALL';
let ALL_ORDERS = [];

function dateKeyBkk(val) {
  const d = new Date(val);
  if (isNaN(d.getTime())) return '';
  const bkk = new Date(d.toLocaleString('en-US', {timeZone:'Asia/Bangkok'}));
  return `${bkk.getFullYear()}-${String(bkk.getMonth()+1).padStart(2,'0')}-${String(bkk.getDate()).padStart(2,'0')}`;
}

function timeDiffMinutes(createdAt) {
  const d = new Date(createdAt);
  if (isNaN(d.getTime())) return 0;
  return Math.floor((Date.now() - d.getTime()) / 60000);
}

function timeLabel(mins) {
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins/60)}h ${mins%60}m`;
}

function timerClass(mins) {
  if (mins < 10) return 'timer-ok';
  if (mins < 20) return 'timer-warn';
  return 'timer-urgent';
}

// ============================================================
// LOAD
// ============================================================
async function loadOrders() {
  try {
    const res = await fetch(`${GAS_URL}?action=get_orders_sheet`);
    const json = await res.json();
    if (json.success && json.data) {
      const todayStr = dateKeyBkk(new Date());
      ALL_ORDERS = json.data.filter(o => {
        if (!o.created_at) return false;
        return dateKeyBkk(o.created_at) === todayStr;
      });
      // Init state for new orders not yet in kitchenState
      ALL_ORDERS.forEach(o => {
        if (!kitchenState[o.order_id]) kitchenState[o.order_id] = 'pending';
      });
    }
  } catch(e) {
    console.error('loadOrders:', e);
  }
  renderAll();
}

// ============================================================
// RENDER
// ============================================================
function getDisplayOrders() {
  return ALL_ORDERS.filter(o => {
    if (ACTIVE_BRAND !== 'ALL' && o.brand_id !== ACTIVE_BRAND) return false;
    return true;
  });
}

function renderAll() {
  const orders = getDisplayOrders();
  const pending = orders.filter(o => kitchenState[o.order_id] === 'pending');
  const making  = orders.filter(o => kitchenState[o.order_id] === 'making');
  const done    = orders.filter(o => kitchenState[o.order_id] === 'done');

  document.getElementById('count-pending').textContent = pending.length;
  document.getElementById('count-making').textContent  = making.length;
  document.getElementById('count-done').textContent    = done.length;

  document.getElementById('stat-pending').textContent    = pending.length;
  document.getElementById('stat-making').textContent     = making.length;
  document.getElementById('stat-done-today').textContent = done.length;

  document.getElementById('col-pending').innerHTML = pending.length
    ? pending.map(o => renderCard(o, 'pending')).join('')
    : `<div class="empty-col"><div style="font-size:28px">✅</div><div>No pending orders</div></div>`;

  document.getElementById('col-making').innerHTML = making.length
    ? making.map(o => renderCard(o, 'making')).join('')
    : `<div class="empty-col"><div style="font-size:28px">👨‍🍳</div><div>Nothing in progress</div></div>`;

  document.getElementById('col-done').innerHTML = done.length
    ? done.map(o => renderCard(o, 'done')).join('')
    : `<div class="empty-col"><div style="font-size:28px">🍽</div><div>No ready orders</div></div>`;
}

function renderCard(o, status) {
  const orderId = o.order_id || o.id || '—';
  const brandColor = (o.brand_id === 'HH') ? 'var(--hh)' : 'var(--bb)';
  const tableLabel = o.table_number ? `🪑 ${o.table_number}` : '';
  const custLabel  = o.customer_name && o.customer_name !== 'Walk-in' ? o.customer_name : 'Walk-in';
  const mins = timeDiffMinutes(o.created_at);
  const shortId = String(orderId).slice(-8);

  const items = Array.isArray(o.items) ? o.items : [];
  const itemsHtml = items.length
    ? items.map(i => `
        <div class="order-item">
          <div class="item-qty">${i.qty}×</div>
          <div class="item-name">${i.name}</div>
        </div>`).join('')
    : `<div class="order-item"><div class="item-name" style="color:rgba(255,255,255,0.4)">— item details not available —</div></div>`;

  const footerBtns = status === 'pending'
    ? `<button class="action-btn btn-start" onclick="moveOrder('${orderId}','making')">▶ Start</button>`
    : status === 'making'
    ? `<button class="action-btn btn-recall" onclick="moveOrder('${orderId}','pending')">↩ Recall</button>
       <button class="action-btn btn-done" onclick="moveOrder('${orderId}','done')">✓ Ready</button>`
    : `<button class="action-btn btn-recall" onclick="moveOrder('${orderId}','making')">↩ Reopen</button>`;

  return `
    <div class="order-card" id="card-${orderId}">
      <div class="order-card-header">
        <div class="brand-dot" style="background:${brandColor}"></div>
        <div class="order-id">${shortId}</div>
        ${tableLabel ? `<div class="order-table">${tableLabel}</div>` : ''}
        <span class="timer ${timerClass(mins)}">${timeLabel(mins)}</span>
      </div>
      <div style="padding:4px 14px 0;font-size:10px;color:rgba(255,255,255,0.4)">${custLabel}</div>
      <div class="order-items">${itemsHtml}</div>
      <div class="order-card-footer">${footerBtns}</div>
    </div>`;
}

function moveOrder(orderId, newStatus) {
  kitchenState[orderId] = newStatus;
  renderAll();
}

function switchBrand(brand, btn) {
  ACTIVE_BRAND = brand;
  document.querySelectorAll('.kds-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// Clock
function updateClock() {
  const now = new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit', timeZone:'Asia/Bangkok'});
  document.getElementById('kds-clock').textContent = now;
}

// Auto-refresh every 60 seconds
setInterval(loadOrders, 60000);
setInterval(updateClock, 1000);
updateClock();
loadOrders();
</script>
</body>
</html>
