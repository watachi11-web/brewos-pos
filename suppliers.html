<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers — Brain Brew × Heng Heng</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#143D2B; --green2:#1E5A3F; --orange:#F26C21;
  --bg:#F7E9D6; --card:#ffffff; --border:#e8e2d6;
  --text:#1a2e1a; --muted:#6b7d68;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'Anuphan','Poppins',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
.app { display:flex; height:100vh; }
.sidebar { width:220px; background:var(--green); display:flex; flex-direction:column; flex-shrink:0; padding:0 0 16px; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:8px; }
.sidebar-logo span { font-family:'Poppins',sans-serif; font-size:13px; color:#fff; }
.sidebar-logo-sub { font-size:9px; color:rgba(255,255,255,0.5); margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; padding:0 20px; }
.nav-section { padding:12px 12px 4px; flex:1; overflow-y:auto; }
.nav-label { font-size:9px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; padding:0 8px; margin-bottom:6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:12.5px; color:rgba(255,255,255,0.65); cursor:pointer; transition:all 0.15s; text-decoration:none; margin-bottom:1px; }
.nav-item:hover { background:rgba(255,255,255,0.08); color:#fff; }
.nav-item.active { background:rgba(255,255,255,0.15); color:#fff; font-weight:500; }
.nav-icon { width:16px; text-align:center; font-size:13px; }
.sidebar-footer { padding:12px 20px; border-top:1px solid rgba(255,255,255,0.1); font-size:11px; color:rgba(255,255,255,0.4); }

.topbar { background:var(--bg); padding:20px 28px 0; flex-shrink:0; }
.topbar-top { display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
.topbar-title { font-family:'Poppins',sans-serif; font-size:24px; font-weight:600; }
.topbar-actions { margin-left:auto; display:flex; gap:8px; }
.btn { padding:9px 16px; border-radius:9px; font-size:12.5px; font-weight:500; cursor:pointer; border:none; font-family:'Anuphan','Poppins',sans-serif; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost { background:var(--card); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:#faf8f3; border-color:#d5cdbb; }
.btn-primary { background:var(--green); color:#fff; }
.btn-primary:hover { background:var(--green2); }
.btn:disabled { opacity:.5; pointer-events:none; }

.content { flex:1; overflow-y:auto; padding:20px 28px 28px; }

.filter-row { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
.search-wrap { position:relative; }
.search-input { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:9px 14px 9px 36px; font-size:12.5px; color:var(--text); font-family:'Anuphan','Poppins',sans-serif; outline:none; width:240px; }
.search-input:focus { border-color:var(--green2); }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:0.4; pointer-events:none; }

.supplier-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.supplier-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; }
.supplier-name { font-size:14px; font-weight:700; margin-bottom:4px; }
.supplier-category { font-size:11px; color:var(--orange); font-weight:600; margin-bottom:12px; }
.supplier-row { display:flex; justify-content:space-between; font-size:12.5px; padding:6px 0; border-bottom:1px solid var(--bg); }
.supplier-row:last-child { border-bottom:none; }
.supplier-row-label { color:var(--muted); }
.rating-stars { color:var(--orange); font-size:12px; }

.empty-state { padding:60px 24px; text-align:center; color:var(--muted); grid-column:1/-1; }
.loading-text { padding:40px; text-align:center; color:var(--muted); font-size:13px; grid-column:1/-1; }

.modal-overlay { position:fixed; inset:0; background:rgba(26,46,26,0.4); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal { background:var(--card); border-radius:18px; width:460px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
.modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:600; }
.modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }
.modal-body { padding:20px 24px; }
.form-group { margin-bottom:16px; }
.form-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; display:block; font-weight:600; }
.form-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:9px 12px; font-size:13px; color:var(--text); font-family:'Anuphan','Poppins',sans-serif; outline:none; }
.form-input:focus { border-color:var(--green2); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-footer { display:flex; gap:8px; justify-content:flex-end; padding-top:4px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo"><img src="logo-hh-icon.png" style="width:32px;height:32px;object-fit:contain;flex-shrink:0" onerror="this.style.display='none'"> <span>Brain Brew × Heng Heng</span></div>
    <div class="sidebar-logo-sub">Back Office</div>
    <div class="nav-section">
      <div class="nav-label" style="margin-top:14px">Main</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">▦</span>Dashboard</a>
      <a href="pos.html" class="nav-item"><span class="nav-icon">🛒</span>POS System</a>
      <div class="nav-label" style="margin-top:14px">Operations</div>
      <a href="kitchen.html" class="nav-item"><span class="nav-icon">👨‍🍳</span>Kitchen</a>
      <a href="orders.html" class="nav-item"><span class="nav-icon">📋</span>Orders</a>
      <a href="inventory.html" class="nav-item"><span class="nav-icon">📦</span>Inventory</a>
      <a href="recipe.html" class="nav-item"><span class="nav-icon">📝</span>Recipes</a>
      <div class="nav-label" style="margin-top:14px">Business</div>
      <a href="crm.html" class="nav-item"><span class="nav-icon">👥</span>CRM / Members</a>
      <a href="finance.html" class="nav-item"><span class="nav-icon">💰</span>Finance</a>
      <a href="reports.html" class="nav-item"><span class="nav-icon">📊</span>Reports</a>
      <a href="suppliers.html" class="nav-item active"><span class="nav-icon">🚚</span>Suppliers</a>
      <div class="nav-label" style="margin-top:14px">Settings</div>
      <a href="staff.html" class="nav-item"><span class="nav-icon">🧑‍💼</span>Staff</a>
      <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>Settings</a>
    </div>
    <div class="sidebar-footer" id="staff-footer">Owner · All Brands</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-top">
        <div class="topbar-title">Suppliers</div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" onclick="loadSuppliers()">⟳ Refresh</button>
          <button class="btn btn-primary" onclick="UI.openModal('add-modal')">+ Add Supplier</button>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="filter-row">
        <div class="search-wrap">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="#6b7d68" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
          <input class="search-input" type="text" placeholder="Search suppliers…" oninput="filterSuppliers(this.value)">
        </div>
        <span style="margin-left:auto;font-size:11.5px;color:var(--muted)" id="supplier-count">0 suppliers</span>
      </div>

      <div class="supplier-grid" id="supplier-grid">
        <div class="loading-text">⏳ Loading…</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Supplier</div>
      <button class="modal-close" onclick="UI.closeModal('add-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Company Name</label>
          <input class="form-input" type="text" id="add-name" placeholder="Company name">
        </div>
        <div class="form-group">
          <label class="form-label">Contact Person</label>
          <input class="form-input" type="text" id="add-contact" placeholder="Name">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" type="text" id="add-phone" placeholder="0X-XXXX-XXXX">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="add-email" placeholder="Optional">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Payment Terms</label>
          <select class="form-input" id="add-terms">
            <option value="cod">Cash on Delivery</option>
            <option value="net7">Net 7 days</option>
            <option value="net14">Net 14 days</option>
            <option value="net30">Net 30 days</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Brand</label>
          <select class="form-input" id="add-brand">
            <option value="BOTH">Both Brands</option>
            <option value="BB">Brain Brew Only</option>
            <option value="HH">Heng Heng Only</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Category / Products Supplied</label>
        <input class="form-input" type="text" id="add-category" placeholder="e.g. Coffee beans, packaging…">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <input class="form-input" type="text" id="add-notes" placeholder="Optional">
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal('add-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-supplier-btn" onclick="saveSupplier()">Save Supplier</button>
      </div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// suppliers.html — ผูกกับ get_suppliers()/create_supplier() ใน รหัส.gs ที่มีอยู่แล้ว
// (มี tab Suppliers ใน inventory.html อยู่แล้วเช่นกัน — หน้านี้ให้มุมมองแบบ card
// เต็มหน้าจอสำหรับดูรายละเอียดผู้ขายทั้งหมดโดยเฉพาะ)
// ═══════════════════════════════════════════════════════════
let SUPPLIERS = [];
let filterText = '';

document.getElementById('staff-footer').textContent = Identity.getName() + ' · All Brands';

const TERMS_LABEL = { cod:'Cash on Delivery', net7:'Net 7 days', net14:'Net 14 days', net30:'Net 30 days' };

async function loadSuppliers() {
  document.getElementById('supplier-grid').innerHTML = '<div class="loading-text">⏳ Loading…</div>';
  try {
    SUPPLIERS = await API.suppliers();
  } catch(e) {
    console.error('loadSuppliers failed:', e);
    UI.toast('โหลดข้อมูลไม่สำเร็จ: ' + e.message, 'error');
    SUPPLIERS = [];
  }
  renderSuppliers();
}
document.addEventListener('DOMContentLoaded', loadSuppliers);

function filterSuppliers(q) { filterText = q.toLowerCase(); renderSuppliers(); }

function renderSuppliers() {
  const items = SUPPLIERS.filter(s => {
    if (!filterText) return true;
    return (s.company_name||'').toLowerCase().includes(filterText) || (s.category||'').toLowerCase().includes(filterText);
  });

  document.getElementById('supplier-count').textContent = `${items.length} supplier${items.length!==1?'s':''}`;
  const grid = document.getElementById('supplier-grid');

  if (!items.length) { grid.innerHTML = '<div class="empty-state">No suppliers found</div>'; return; }

  grid.innerHTML = items.map(s => {
    const rating = Math.round(Number(s.rating || 0));
    const stars = '★'.repeat(rating) + '☆'.repeat(Math.max(0, 5 - rating));
    return `
      <div class="supplier-card">
        <div class="supplier-name">${s.company_name}</div>
        <div class="supplier-category">${s.category || 'General supplier'}</div>
        <div class="supplier-row"><span class="supplier-row-label">Contact</span><span>${s.contact_name || '—'}</span></div>
        <div class="supplier-row"><span class="supplier-row-label">Phone</span><span>${s.phone || '—'}</span></div>
        ${s.email ? `<div class="supplier-row"><span class="supplier-row-label">Email</span><span>${s.email}</span></div>` : ''}
        <div class="supplier-row"><span class="supplier-row-label">Payment Terms</span><span>${TERMS_LABEL[s.payment_terms] || s.payment_terms || '—'}</span></div>
        <div class="supplier-row"><span class="supplier-row-label">Brand</span><span>${s.brand_id || 'BOTH'}</span></div>
        <div class="supplier-row"><span class="supplier-row-label">Rating</span><span class="rating-stars">${stars}</span></div>
        ${s.notes ? `<div style="margin-top:10px;font-size:11.5px;color:var(--muted);background:var(--bg);border-radius:8px;padding:8px 10px">${s.notes}</div>` : ''}
      </div>
    `;
  }).join('');
}

async function saveSupplier() {
  const name = document.getElementById('add-name').value.trim();
  if (!name) { UI.toast('Please enter a company name.', 'error'); return; }

  const btn = document.getElementById('save-supplier-btn');
  UI.loading(btn, true);
  try {
    const result = await API.createSupplier({
      brand_id: document.getElementById('add-brand').value,
      company_name: name,
      contact_name: document.getElementById('add-contact').value.trim(),
      phone: document.getElementById('add-phone').value.trim(),
      email: document.getElementById('add-email').value.trim(),
      payment_terms: document.getElementById('add-terms').value,
      category: document.getElementById('add-category').value.trim(),
      rating: 0,
      notes: document.getElementById('add-notes').value.trim(),
    });
    if (!result || !result.success) throw new Error((result && result.error) || 'บันทึกไม่สำเร็จ');
    UI.toast('เพิ่มผู้ขายใหม่แล้ว: ' + result.supplier_id);
    UI.closeModal('add-modal');
    ['add-name','add-contact','add-phone','add-email','add-category','add-notes'].forEach(id => document.getElementById(id).value = '');
    await loadSuppliers();
  } catch(e) {
    UI.toast('บันทึกไม่สำเร็จ: ' + e.message, 'error');
  } finally {
    UI.loading(btn, false);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); });
  });
});
</script>
</body>
</html>
