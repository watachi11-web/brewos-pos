<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand & Menu Editor — Brain Brew × Heng Heng</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#143D2B; --green2:#1E5A3F; --orange:#F26C21;
  --bg:#F7E9D6; --card:#ffffff; --border:#e8e2d6;
  --text:#1a2e1a; --muted:#6b7d68;
  --bb:#52B788; --hh:#FB923C;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'Anuphan','Poppins',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
.app { display:flex; height:100vh; }
.sidebar { width:220px; background:var(--green); display:flex; flex-direction:column; flex-shrink:0; padding:0 0 16px; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:8px; }
.sidebar-logo span { font-family:'Poppins',sans-serif; font-size:13px; color:#fff; }
.sidebar-logo-sub { font-size:9px; color:rgba(255,255,255,0.5); margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; padding:0 20px; }
.nav-section { padding:12px 12px 4px; flex:1; overflow-y:auto; }
.nav-label { font-size:9px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; padding:0 8px; margin-bottom:6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:12.5px; color:rgba(255,255,255,0.65); cursor:pointer; transition:all 0.15s; text-decoration:none; margin-bottom:1px; }
.nav-item:hover { background:rgba(255,255,255,0.08); color:#fff; }
.nav-item.active { background:rgba(255,255,255,0.15); color:#fff; font-weight:500; }
.nav-icon { width:16px; text-align:center; font-size:13px; }
.sidebar-footer { padding:12px 20px; border-top:1px solid rgba(255,255,255,0.1); font-size:11px; color:rgba(255,255,255,0.4); }

.topbar { background:var(--bg); padding:20px 28px 0; flex-shrink:0; }
.topbar-top { display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
.topbar-title { font-family:'Poppins',sans-serif; font-size:24px; font-weight:600; }
.brand-switch { display:flex; gap:4px; background:var(--card); padding:4px; border-radius:10px; border:1px solid var(--border); }
.brand-tab { padding:7px 16px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; color:var(--muted); border:none; background:transparent; transition:all 0.15s; font-family:'Anuphan','Poppins',sans-serif; }
.brand-tab.active { background:var(--green); color:#fff; }
.topbar-actions { margin-left:auto; display:flex; gap:8px; }
.btn { padding:9px 16px; border-radius:9px; font-size:12.5px; font-weight:500; cursor:pointer; border:none; font-family:'Anuphan','Poppins',sans-serif; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost { background:var(--card); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:#faf8f3; border-color:#d5cdbb; }
.btn-primary { background:var(--green); color:#fff; }
.btn-primary:hover { background:var(--green2); }
.btn-sm { padding:6px 12px; font-size:11.5px; }
.btn:disabled { opacity:.5; pointer-events:none; }

.content { flex:1; overflow-y:auto; padding:20px 28px 28px; }

.cat-section { margin-bottom:22px; }
.cat-section-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.cat-title { font-size:14px; font-weight:700; }
.cat-badge { font-size:10px; color:var(--muted); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:2px 9px; }
.add-item-btn { margin-left:auto; font-size:11px; padding:6px 12px; }

.product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.product-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; position:relative; }
.product-card.unavailable { opacity:.5; }
.product-emoji { font-size:28px; margin-bottom:8px; }
.product-name { font-size:13px; font-weight:600; margin-bottom:2px; }
.product-name-th { font-size:11px; color:var(--muted); margin-bottom:8px; }
.product-price-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
.product-price { font-size:16px; font-weight:800; color:var(--green); }
.product-cost { font-size:10.5px; color:var(--muted); }
.product-actions { display:flex; gap:6px; }
.icon-btn { flex:1; padding:6px; border-radius:7px; background:var(--bg); border:1px solid var(--border); color:var(--text); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; gap:4px; }
.icon-btn:hover { background:#faf8f3; }
.icon-btn.danger:hover { background:#FEF2F2; color:#DC2626; border-color:#FECACA; }
.featured-badge { position:absolute; top:10px; right:10px; background:var(--orange); color:#fff; font-size:8px; font-weight:800; padding:2px 6px; border-radius:6px; }

.empty-state { padding:40px 24px; text-align:center; color:var(--muted); }
.loading-text { padding:40px; text-align:center; color:var(--muted); font-size:13px; }

.modal-overlay { position:fixed; inset:0; background:rgba(26,46,26,0.4); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal { background:var(--card); border-radius:18px; width:440px; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
.modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:600; }
.modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }
.modal-body { padding:20px 24px; }
.form-group { margin-bottom:16px; }
.form-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; display:block; font-weight:600; }
.form-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:9px 12px; font-size:13px; color:var(--text); font-family:'Anuphan','Poppins',sans-serif; outline:none; }
.form-input:focus { border-color:var(--green2); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-footer { display:flex; gap:8px; justify-content:flex-end; padding-top:4px; }
.checkbox-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.checkbox-row input { width:16px; height:16px; accent-color:var(--green); }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo"><img src="logo-hh-icon.png" style="width:32px;height:32px;object-fit:contain;flex-shrink:0" onerror="this.style.display='none'"> <span>Brain Brew × Heng Heng</span></div>
    <div class="sidebar-logo-sub">Back Office</div>
    <div class="nav-section">
      <div class="nav-label" style="margin-top:14px">Main</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">▦</span>Dashboard</a>
      <a href="pos.html" class="nav-item"><span class="nav-icon">🛒</span>POS System</a>
      <div class="nav-label" style="margin-top:14px">Operations</div>
      <a href="kitchen.html" class="nav-item"><span class="nav-icon">👨‍🍳</span>Kitchen</a>
      <a href="orders.html" class="nav-item"><span class="nav-icon">📋</span>Orders</a>
      <a href="inventory.html" class="nav-item"><span class="nav-icon">📦</span>Inventory</a>
      <a href="recipe.html" class="nav-item"><span class="nav-icon">📝</span>Recipes</a>
      <div class="nav-label" style="margin-top:14px">Business</div>
      <a href="crm.html" class="nav-item"><span class="nav-icon">👥</span>CRM / Members</a>
      <a href="finance.html" class="nav-item"><span class="nav-icon">💰</span>Finance</a>
      <a href="reports.html" class="nav-item"><span class="nav-icon">📊</span>Reports</a>
      <div class="nav-label" style="margin-top:14px">Admin</div>
      <a href="staff.html" class="nav-item"><span class="nav-icon">🧑‍💼</span>Staff</a>
      <a href="brand_editor.html" class="nav-item active"><span class="nav-icon">🎨</span>Brand & Menu</a>
      <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>Settings</a>
    </div>
    <div class="sidebar-footer" id="staff-footer">Owner · All Brands</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-top">
        <div class="topbar-title">Brand & Menu Editor</div>
        <div class="brand-switch">
          <button class="brand-tab active" onclick="switchBrand('ALL', this)">All</button>
          <button class="brand-tab" onclick="switchBrand('BB', this)">Brain Brew</button>
          <button class="brand-tab" onclick="switchBrand('HH', this)">Heng Heng</button>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" onclick="loadData()">⟳ Refresh</button>
          <button class="btn btn-ghost" onclick="openCategoryModal()">+ Category</button>
          <button class="btn btn-primary" onclick="openProductModal()">+ Menu Item</button>
        </div>
      </div>
    </div>

    <div class="content" id="menu-content">
      <div class="loading-text">⏳ Loading…</div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="product-modal-title">Add Menu Item</div>
      <button class="modal-close" onclick="UI.closeModal('product-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pm-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" type="text" id="pm-name" placeholder="e.g. Neuron Latte">
        </div>
        <div class="form-group">
          <label class="form-label">Name (Thai)</label>
          <input class="form-input" type="text" id="pm-name-th" placeholder="ชื่อไทย">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Brand</label>
          <select class="form-input" id="pm-brand" onchange="populateCategoryOptions()">
            <option value="BB">Brain Brew</option>
            <option value="HH">Heng Heng</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input" id="pm-category"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Price (฿)</label>
          <input class="form-input" type="number" id="pm-price" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Cost (฿)</label>
          <input class="form-input" type="number" id="pm-cost" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Emoji</label>
          <input class="form-input" type="text" id="pm-emoji" placeholder="☕" maxlength="4">
        </div>
        <div class="form-group">
          <label class="form-label">Image URL (optional)</label>
          <input class="form-input" type="text" id="pm-image" placeholder="https://…">
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="pm-featured">
        <label for="pm-featured" style="font-size:12.5px">Featured / Best Seller</label>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal('product-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-product-btn" onclick="saveProduct()">Save Item</button>
      </div>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal-overlay" id="category-modal">
  <div class="modal" style="width:380px">
    <div class="modal-header">
      <div class="modal-title">Add Category</div>
      <button class="modal-close" onclick="UI.closeModal('category-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Category Name</label>
        <input class="form-input" type="text" id="cm-name" placeholder="e.g. Cold Brew">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Brand</label>
          <select class="form-input" id="cm-brand">
            <option value="BB">Brain Brew</option>
            <option value="HH">Heng Heng</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Emoji</label>
          <input class="form-input" type="text" id="cm-emoji" placeholder="☕" maxlength="4">
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal('category-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-category-btn" onclick="saveCategory()">Save Category</button>
      </div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// brand_editor.html — ผูกกับ create_product/update_product/delete_product/create_category
// ที่เพิ่งเพิ่มเข้า รหัส.gs v4.8.0 (เดิม backend ไม่มี route จัดการเมนูเลย — api.js เคย
// stub ไว้เป็น notImplemented() ทั้งหมด ตอนนี้ใช้งานได้จริงแล้ว)
// ═══════════════════════════════════════════════════════════
let CATEGORIES = [];
let PRODUCTS = [];
let ACTIVE_BRAND = 'ALL';

document.getElementById('staff-footer').textContent = Identity.getName() + ' · All Brands';

async function loadData() {
  document.getElementById('menu-content').innerHTML = '<div class="loading-text">⏳ Loading…</div>';
  try {
    const menu = await API.menuData();
    CATEGORIES = menu.categories || [];
    PRODUCTS = menu.products || [];
  } catch(e) {
    console.error('loadData failed:', e);
    document.getElementById('menu-content').innerHTML = `<div class="empty-state">โหลดไม่สำเร็จ: ${e.message}</div>`;
    return;
  }
  renderMenu();
}
document.addEventListener('DOMContentLoaded', loadData);

function switchBrand(brand, btn) {
  ACTIVE_BRAND = brand;
  document.querySelectorAll('.brand-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
}

function renderMenu() {
  const cats = CATEGORIES.filter(c => ACTIVE_BRAND === 'ALL' || c.brand_id === ACTIVE_BRAND)
    .sort((a,b) => (a.display_order||99) - (b.display_order||99));
  const content = document.getElementById('menu-content');

  if (!cats.length) {
    content.innerHTML = '<div class="empty-state">No categories found for this brand yet. Click "+ Category" to add one.</div>';
    return;
  }

  content.innerHTML = cats.map(cat => {
    const products = PRODUCTS.filter(p => p.category_id === cat.category_id);
    return `
      <div class="cat-section">
        <div class="cat-section-header">
          <span style="font-size:18px">${cat.emoji||'☕'}</span>
          <span class="cat-title">${cat.name}</span>
          <span class="cat-badge">${cat.brand_id} · ${products.length} items</span>
          <button class="btn btn-ghost add-item-btn" onclick="openProductModal('${cat.category_id}','${cat.brand_id}')">+ Add item here</button>
        </div>
        <div class="product-grid">
          ${products.length ? products.map(p => renderProductCard(p)).join('') : '<div class="empty-state" style="grid-column:1/-1;padding:20px">No items in this category</div>'}
        </div>
      </div>
    `;
  }).join('');
}

function renderProductCard(p) {
  return `
    <div class="product-card">
      ${p.is_featured ? '<div class="featured-badge">★ FEATURED</div>' : ''}
      <div class="product-emoji">${p.emoji || '🍽'}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-name-th">${p.name_th || '&nbsp;'}</div>
      <div class="product-price-row">
        <span class="product-price">฿${p.base_price}</span>
        <span class="product-cost">cost ฿${p.cost_price}</span>
      </div>
      <div class="product-actions">
        <button class="icon-btn" onclick='editProduct(${JSON.stringify(p)})'>✎ Edit</button>
        <button class="icon-btn danger" onclick="deleteProductConfirm('${p.product_id}','${p.name.replace(/'/g,"\\'")}')">✕ Delete</button>
      </div>
    </div>
  `;
}

// ── PRODUCT MODAL ──
function populateCategoryOptions() {
  const brand = document.getElementById('pm-brand').value;
  const sel = document.getElementById('pm-category');
  const cats = CATEGORIES.filter(c => c.brand_id === brand);
  sel.innerHTML = cats.map(c => `<option value="${c.category_id}">${c.emoji||''} ${c.name}</option>`).join('') || '<option value="">No categories — add one first</option>';
}

function openProductModal(categoryId, brandId) {
  document.getElementById('product-modal-title').textContent = 'Add Menu Item';
  document.getElementById('pm-id').value = '';
  document.getElementById('pm-name').value = '';
  document.getElementById('pm-name-th').value = '';
  document.getElementById('pm-price').value = '';
  document.getElementById('pm-cost').value = '';
  document.getElementById('pm-emoji').value = '';
  document.getElementById('pm-image').value = '';
  document.getElementById('pm-featured').checked = false;
  document.getElementById('pm-brand').value = brandId || (ACTIVE_BRAND !== 'ALL' ? ACTIVE_BRAND : 'BB');
  populateCategoryOptions();
  if (categoryId) document.getElementById('pm-category').value = categoryId;
  UI.openModal('product-modal');
}

function editProduct(p) {
  document.getElementById('product-modal-title').textContent = 'Edit Menu Item';
  document.getElementById('pm-id').value = p.product_id;
  document.getElementById('pm-name').value = p.name;
  document.getElementById('pm-name-th').value = p.name_th || '';
  document.getElementById('pm-price').value = p.base_price;
  document.getElementById('pm-cost').value = p.cost_price;
  document.getElementById('pm-emoji').value = p.emoji || '';
  document.getElementById('pm-image').value = p.image_url || '';
  document.getElementById('pm-featured').checked = !!p.is_featured;
  document.getElementById('pm-brand').value = p.brand_id;
  populateCategoryOptions();
  document.getElementById('pm-category').value = p.category_id;
  UI.openModal('product-modal');
}

async function saveProduct() {
  const id = document.getElementById('pm-id').value;
  const name = document.getElementById('pm-name').value.trim();
  if (!name) { UI.toast('กรุณากรอกชื่อเมนู', 'error'); return; }

  const payload = {
    name,
    name_th: document.getElementById('pm-name-th').value.trim(),
    brand_id: document.getElementById('pm-brand').value,
    category_id: document.getElementById('pm-category').value,
    base_price: parseFloat(document.getElementById('pm-price').value) || 0,
    cost_price: parseFloat(document.getElementById('pm-cost').value) || 0,
    emoji: document.getElementById('pm-emoji').value.trim() || '🍽',
    image_url: document.getElementById('pm-image').value.trim(),
    is_featured: document.getElementById('pm-featured').checked,
  };

  const btn = document.getElementById('save-product-btn');
  UI.loading(btn, true);
  try {
    const result = id ? await API.updateProduct({ product_id: id, ...payload }) : await API.createProduct(payload);
    if (!result || !result.success) throw new Error((result && result.error) || 'บันทึกไม่สำเร็จ');
    UI.toast(id ? 'แก้ไขเมนูแล้ว' : 'เพิ่มเมนูใหม่แล้ว: ' + result.product_id);
    UI.closeModal('product-modal');
    await loadData();
  } catch(e) {
    UI.toast('บันทึกไม่สำเร็จ: ' + e.message, 'error');
  } finally {
    UI.loading(btn, false);
  }
}

async function deleteProductConfirm(id, name) {
  if (!confirm(`Delete "${name}"? It will be hidden from the menu (soft delete) — existing order history is preserved.`)) return;
  try {
    const result = await API.deleteProduct(id);
    if (!result || !result.success) throw new Error((result && result.error) || 'ลบไม่สำเร็จ');
    UI.toast('ลบเมนูแล้ว');
    await loadData();
  } catch(e) {
    UI.toast('ลบไม่สำเร็จ: ' + e.message, 'error');
  }
}

// ── CATEGORY MODAL ──
function openCategoryModal() {
  document.getElementById('cm-name').value = '';
  document.getElementById('cm-emoji').value = '';
  document.getElementById('cm-brand').value = ACTIVE_BRAND !== 'ALL' ? ACTIVE_BRAND : 'BB';
  UI.openModal('category-modal');
}

async function saveCategory() {
  const name = document.getElementById('cm-name').value.trim();
  if (!name) { UI.toast('กรุณากรอกชื่อหมวดหมู่', 'error'); return; }

  const btn = document.getElementById('save-category-btn');
  UI.loading(btn, true);
  try {
    const result = await API.createCategory({
      name,
      brand_id: document.getElementById('cm-brand').value,
      emoji: document.getElementById('cm-emoji').value.trim() || '☕',
    });
    if (!result || !result.success) throw new Error((result && result.error) || 'บันทึกไม่สำเร็จ');
    UI.toast('เพิ่มหมวดหมู่แล้ว: ' + result.category_id);
    UI.closeModal('category-modal');
    await loadData();
  } catch(e) {
    UI.toast('บันทึกไม่สำเร็จ: ' + e.message, 'error');
  } finally {
    UI.loading(btn, false);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); });
  });
});
</script>
</body>
</html>
