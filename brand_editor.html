<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Editor — BrewOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1B4332; --green2:#2D6A4F;
  --bg:#f5f0e8; --card:#ffffff; --border:#e8e2d6;
  --text:#1a2e1a; --muted:#6b7d68;
  --success:#16A34A; --success-bg:#F0FDF4;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
.app { display:flex; height:100vh; }
.sidebar { width:220px; background:var(--green); display:flex; flex-direction:column; flex-shrink:0; padding:0 0 16px; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:8px; }
.sidebar-logo span { font-family:'Playfair Display',serif; font-size:13px; color:#fff; }
.sidebar-logo-sub { font-size:9px; color:rgba(255,255,255,0.5); margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; padding:0 20px; }
.nav-section { padding:12px 12px 4px; flex:1; overflow-y:auto; }
.nav-label { font-size:9px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; padding:0 8px; margin-bottom:6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:12.5px; color:rgba(255,255,255,0.65); cursor:pointer; transition:all 0.15s; text-decoration:none; margin-bottom:1px; }
.nav-item:hover { background:rgba(255,255,255,0.08); color:#fff; }
.nav-item.active { background:rgba(255,255,255,0.15); color:#fff; font-weight:500; }
.nav-icon { width:16px; text-align:center; font-size:13px; }
.sidebar-footer { padding:12px 20px; border-top:1px solid rgba(255,255,255,0.1); font-size:11px; color:rgba(255,255,255,0.4); }

.topbar { background:var(--bg); padding:20px 28px 0; flex-shrink:0; }
.topbar-top { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.topbar-title { font-family:'Playfair Display',serif; font-size:24px; font-weight:600; }
.topbar-actions { margin-left:auto; display:flex; gap:8px; }
.btn { padding:9px 16px; border-radius:9px; font-size:12.5px; font-weight:500; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost { background:var(--card); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:#faf8f3; }

.content { flex:1; overflow-y:auto; padding:20px 28px 28px; max-width:900px; }
.content::-webkit-scrollbar { width:6px; }
.content::-webkit-scrollbar-thumb { background:#d5cdbb; border-radius:3px; }

.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

.brand-card { background:var(--card); border:1px solid var(--border); border-radius:18px; overflow:hidden; margin-bottom:16px; }
.brand-header { padding:24px; text-align:center; color:#fff; }
.brand-icon-preview { font-size:40px; margin-bottom:8px; }
.brand-name-preview { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; }
.brand-tagline-preview { font-size:11.5px; opacity:0.85; margin-top:4px; }

.brand-body { padding:20px; }
.form-group { margin-bottom:16px; }
.form-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; display:block; font-weight:600; }
.form-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:9px 12px; font-size:13px; color:var(--text); font-family:'DM Sans',sans-serif; outline:none; }
.form-input:focus { border-color:var(--green2); }
.color-row { display:flex; gap:10px; align-items:center; }
.color-swatch { width:42px; height:42px; border-radius:10px; border:2px solid var(--border); cursor:pointer; flex-shrink:0; padding:0; }
.color-presets { display:flex; gap:6px; margin-top:8px; }
.preset-dot { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all 0.15s; }
.preset-dot:hover { transform:scale(1.15); }
.preset-dot.selected { border-color:var(--text); }

.save-bar { position:sticky; bottom:0; background:var(--card); border-top:1px solid var(--border); padding:16px 24px; display:flex; justify-content:flex-end; gap:8px; margin-top:8px; border-radius:0 0 18px 18px; }
.btn-save { background:var(--green); color:#fff; padding:10px 22px; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; }
.btn-save:hover { background:var(--green2); }

.shop-info-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:16px; }
.section-title { font-size:14px; font-weight:600; margin-bottom:16px; }

.save-toast { position:fixed; bottom:24px; right:24px; background:var(--green); color:#fff; padding:10px 18px; border-radius:12px; font-size:13px; font-weight:500; transform:translateY(60px); opacity:0; transition:all 0.3s; z-index:100; }
.save-toast.show { transform:translateY(0); opacity:1; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">☕ <span>Brain Brew × Heng Heng</span></div>
    <div class="sidebar-logo-sub">Back Office</div>
    <div class="nav-section">
      <div class="nav-label" style="margin-top:14px">Main</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">▦</span>Dashboard</a>
      <a href="pos.html" class="nav-item"><span class="nav-icon">🛒</span>POS System</a>
      <div class="nav-label" style="margin-top:14px">Operations</div>
      <a href="kitchen.html" class="nav-item"><span class="nav-icon">👨‍🍳</span>Kitchen</a>
      <a href="orders.html" class="nav-item"><span class="nav-icon">📋</span>Orders</a>
      <a href="inventory.html" class="nav-item"><span class="nav-icon">📦</span>Inventory</a>
      <a href="recipe.html" class="nav-item"><span class="nav-icon">📝</span>Recipes</a>
      <a href="production.html" class="nav-item"><span class="nav-icon">🏭</span>Production</a>
      <div class="nav-label" style="margin-top:14px">Business</div>
      <a href="crm.html" class="nav-item"><span class="nav-icon">👥</span>CRM / Members</a>
      <a href="finance.html" class="nav-item"><span class="nav-icon">💰</span>Finance</a>
      <a href="reports.html" class="nav-item"><span class="nav-icon">📊</span>Reports</a>
      <div class="nav-label" style="margin-top:14px">Settings</div>
      <a href="staff.html" class="nav-item"><span class="nav-icon">🧑‍💼</span>Staff</a>
      <a href="brand_editor.html" class="nav-item active"><span class="nav-icon">🎨</span>Brand Editor</a>
      <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>Settings</a>
    </div>
    <div class="sidebar-footer">Owner · All Brands</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-top">
        <div class="topbar-title">Brand Editor</div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" onclick="loadBrandData()">⟳ Refresh</button>
        </div>
      </div>
    </div>

    <div class="content" id="content">
      <div style="text-align:center;padding:60px;color:var(--muted)">⏳ Loading…</div>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast">✅ Saved</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxw8XBigvESVUCugH7CNUnTWel_s_oMdRrJ4Bbyeb43wF5gwrUaOXrzKIUADUsPR52Pdg/exec';
let SETTINGS = {};

const PRESET_COLORS = ['#1B4332','#2D6A4F','#F97316','#FB923C','#6366F1','#0EA5E9','#DC2626','#D97706','#52B788','#92400E'];

async function loadBrandData() {
  try {
    const res = await fetch(`${GAS_URL}?action=get_settings`);
    const json = await res.json();
    SETTINGS = (json.success && json.data) ? json.data : {};
  } catch(e) {
    console.error(e);
    SETTINGS = {};
  }
  render();
}
document.addEventListener('DOMContentLoaded', loadBrandData);

function val(key, fallback='') {
  return SETTINGS[key] ? SETTINGS[key].value : fallback;
}

function render() {
  const bbColor = val('brand_bb_color', '#1B4332');
  const hhColor = val('brand_hh_color', '#F97316');
  const bbEmoji = val('brand_bb_emoji', '☕');
  const hhEmoji = val('brand_hh_emoji', '🍱');
  const bbTag = val('brand_bb_tagline', 'Specialty Coffee');
  const hhTag = val('brand_hh_tagline', 'อาหารเพื่อสุขภาพ');
  const bbName = val('shop_name_bb', 'Brain Brew Coffee');
  const hhName = val('shop_name_hh', 'Heng Heng Phanit');

  document.getElementById('content').innerHTML = `
    <div class="shop-info-card">
      <div class="section-title">🏪 Shop Information</div>
      <div class="two-col">
        <div class="form-group">
          <label class="form-label">Address</label>
          <input class="form-input" id="shop_address" value="${val('shop_address')}" onchange="save('shop_address', this.value)">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" id="shop_phone" value="${val('shop_phone')}" onchange="save('shop_phone', this.value)">
        </div>
      </div>
    </div>

    <div class="two-col">
      <div class="brand-card">
        <div class="brand-header" style="background:${bbColor}" id="bb-preview-header">
          <div class="brand-icon-preview" id="bb-preview-icon">${bbEmoji}</div>
          <div class="brand-name-preview" id="bb-preview-name">${bbName}</div>
          <div class="brand-tagline-preview" id="bb-preview-tag">${bbTag}</div>
        </div>
        <div class="brand-body">
          <div class="form-group">
            <label class="form-label">Brand Name</label>
            <input class="form-input" id="shop_name_bb" value="${bbName}" oninput="livePreview('bb')" onchange="save('shop_name_bb', this.value)">
          </div>
          <div class="form-group">
            <label class="form-label">Tagline</label>
            <input class="form-input" id="brand_bb_tagline" value="${bbTag}" oninput="livePreview('bb')" onchange="save('brand_bb_tagline', this.value)">
          </div>
          <div class="form-group">
            <label class="form-label">Icon / Emoji</label>
            <input class="form-input" id="brand_bb_emoji" value="${bbEmoji}" maxlength="4" oninput="livePreview('bb')" onchange="save('brand_bb_emoji', this.value)" style="width:80px">
          </div>
          <div class="form-group">
            <label class="form-label">Brand Color</label>
            <div class="color-row">
              <input type="color" class="color-swatch" id="brand_bb_color" value="${bbColor}" oninput="livePreview('bb')" onchange="save('brand_bb_color', this.value)">
              <input class="form-input" id="bb_color_text" value="${bbColor}" onchange="syncColorText('bb', this.value)" style="flex:1">
            </div>
            <div class="color-presets" id="bb-presets"></div>
          </div>
        </div>
      </div>

      <div class="brand-card">
        <div class="brand-header" style="background:${hhColor}" id="hh-preview-header">
          <div class="brand-icon-preview" id="hh-preview-icon">${hhEmoji}</div>
          <div class="brand-name-preview" id="hh-preview-name">${hhName}</div>
          <div class="brand-tagline-preview" id="hh-preview-tag">${hhTag}</div>
        </div>
        <div class="brand-body">
          <div class="form-group">
            <label class="form-label">Brand Name</label>
            <input class="form-input" id="shop_name_hh" value="${hhName}" oninput="livePreview('hh')" onchange="save('shop_name_hh', this.value)">
          </div>
          <div class="form-group">
            <label class="form-label">Tagline</label>
            <input class="form-input" id="brand_hh_tagline" value="${hhTag}" oninput="livePreview('hh')" onchange="save('brand_hh_tagline', this.value)">
          </div>
          <div class="form-group">
            <label class="form-label">Icon / Emoji</label>
            <input class="form-input" id="brand_hh_emoji" value="${hhEmoji}" maxlength="4" oninput="livePreview('hh')" onchange="save('brand_hh_emoji', this.value)" style="width:80px">
          </div>
          <div class="form-group">
            <label class="form-label">Brand Color</label>
            <div class="color-row">
              <input type="color" class="color-swatch" id="brand_hh_color" value="${hhColor}" oninput="livePreview('hh')" onchange="save('brand_hh_color', this.value)">
              <input class="form-input" id="hh_color_text" value="${hhColor}" onchange="syncColorText('hh', this.value)" style="flex:1">
            </div>
            <div class="color-presets" id="hh-presets"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="shop-info-card" style="margin-top:16px">
      <div class="section-title">🧾 Receipt Footer Text</div>
      <div class="two-col">
        <div class="form-group">
          <label class="form-label">Brain Brew Receipt Footer</label>
          <input class="form-input" id="receipt_footer_bb" value="${val('receipt_footer_bb')}" onchange="save('receipt_footer_bb', this.value)">
        </div>
        <div class="form-group">
          <label class="form-label">Heng Heng Receipt Footer</label>
          <input class="form-input" id="receipt_footer_hh" value="${val('receipt_footer_hh')}" onchange="save('receipt_footer_hh', this.value)">
        </div>
      </div>
    </div>
  `;

  renderPresets('bb', bbColor);
  renderPresets('hh', hhColor);
}

function renderPresets(brand, current) {
  const wrap = document.getElementById(`${brand}-presets`);
  wrap.innerHTML = PRESET_COLORS.map(c => `
    <div class="preset-dot ${c.toLowerCase()===current.toLowerCase()?'selected':''}" style="background:${c}" onclick="pickPreset('${brand}','${c}')"></div>
  `).join('');
}

function pickPreset(brand, color) {
  document.getElementById(`brand_${brand}_color`).value = color;
  document.getElementById(`${brand}_color_text`).value = color;
  livePreview(brand);
  save(`brand_${brand}_color`, color);
}

function syncColorText(brand, value) {
  if (!/^#[0-9A-Fa-f]{6}$/.test(value)) return;
  document.getElementById(`brand_${brand}_color`).value = value;
  livePreview(brand);
  save(`brand_${brand}_color`, value);
}

function livePreview(brand) {
  const name = document.getElementById(`shop_name_${brand}`).value;
  const tag = document.getElementById(`brand_${brand}_tagline`).value;
  const emoji = document.getElementById(`brand_${brand}_emoji`).value;
  const color = document.getElementById(`brand_${brand}_color`).value;

  document.getElementById(`${brand}-preview-name`).textContent = name;
  document.getElementById(`${brand}-preview-tag`).textContent = tag;
  document.getElementById(`${brand}-preview-icon`).textContent = emoji;
  document.getElementById(`${brand}-preview-header`).style.background = color;
  document.getElementById(`${brand}_color_text`).value = color;
  renderPresets(brand, color);
}

async function save(key, value) {
  try {
    const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify({ action:'update_setting', key, value }) });
    const json = await res.json();
    if (json.success) {
      if (SETTINGS[key]) SETTINGS[key].value = value;
      showToast();
    }
  } catch(e) {
    console.error('save failed', e);
  }
}

function showToast() {
  const t = document.getElementById('save-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
